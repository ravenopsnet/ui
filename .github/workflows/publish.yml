name: Publish Package

on:
  release:
    types: [published] # Triggers when you create a GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC handshake with npm
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Install pnpm before setting up Node so setup-node can handle caching
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest # Automatically grabs the latest stable pnpm version

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: "pnpm" # Automatically caches pnpm dependencies for faster runs

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Validations
        run: |
          pnpm run lint
          pnpm run typecheck

      - name: Compile Library Bundle
        run: pnpm run build

      - name: Publish to npm Registry
        # --no-git-checks prevents pnpm from failing due to newly built /dist files
        run: pnpm publish --no-git-checks
