name: Publish Package

on:
  release:
    types: [published]

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"

      - name: Run release validation
        run: npm run ci

      - name: Pack tested artifact
        id: pack
        run: |
          mkdir artifacts
          npm pack --pack-destination artifacts
          TARBALL=$(find artifacts -maxdepth 1 -name '*.tgz' -print -quit)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish with npm trusted publishing
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public
